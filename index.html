<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payzy Registration</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #1f2937;
    }

    p {
      color: #4b5563;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      padding: 14px 22px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .download {
      margin-top: 16px;
      display: block;
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Complete Your Registration</h1>
    <p>Click below to continue to the Payzy registration page.</p>
    <a id="mainLink" class="btn" href="#" target="_blank" rel="noopener noreferrer">
      Go to Registration
    </a>
    <a id="downloadLink" class="download" href="#">
      Download Link
    </a>
  </div>

  <script>
    const baseUrl = "https://manage.payzy.de/registration";

    // Get profileid from current URL
    const params = new URLSearchParams(window.location.search);
    const profileId = params.get("profileid");

    let finalUrl = baseUrl;

    if (profileId) {
      finalUrl += `?profileid=${encodeURIComponent(profileId)}`;
    }

    // Apply to both links
    document.getElementById("mainLink").href = finalUrl;
    document.getElementById("downloadLink").href = finalUrl;
  </script>
</body>
</html>
